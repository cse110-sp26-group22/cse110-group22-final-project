<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Typing Game</title>
  <link rel="stylesheet" href="../style/qe-style.css" />
</head>

<body>
  <div id="game-ui">
    
    <div id="header">
      <h2>Python Typing Game</h2>
      <span id="progress">0 / 30</span>
    </div>

    <div id="question-box">
      <p id="prompt">Loading question...</p>
    </div>

    <div id="options">
      <!-- buttons inserted here -->
    </div>

    <div id="input-area">
      <input id="typing-input" placeholder="Type your answer..." />
      <button id="submit-btn">Submit</button>
    </div>

    <div id="stats">
      <p>Score: <span id="score">0</span></p>
      <p>Accuracy: <span id="accuracy">100%</span></p>
      <p>WPM: <span id="wpm">0</span></p>
    </div>

  </div>

  <script src="../js/qe.js"></script>
  
</body>
</html>
