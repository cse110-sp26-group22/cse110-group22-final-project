<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Typing Game</title>
  <link rel="preload" href="../assets/fonts/Livvic-Regular.woff2" type="font/woff2" as="font" crossorigin />
  <link rel="stylesheet" href="../style/fonts.css" />
  
  <link rel="stylesheet" href="../style/game-components.css" />
  <link rel="stylesheet" href="../style/components.css" />
  <link rel="stylesheet" href="../style/qe-style.css" />
  <script type="module" src="../js/ui/ui.js"></script>
</head>

<body>

  <!-- RulesBox -->
    <div class="rules-box hidden">
      <h3>How to play!</h3>
      <p>Read the question and submit your answer in the box below.</p>
    </div>

  <!-- MainMenu -->
  <div id="main-menu">
    <h1>Hello, Farm!</h1>
    <ul class="main-menu-list">
      <li><button type="button" class="main-menu-btn" data-language="python">Python</button></li>
      <li><button type="button" class="main-menu-btn" data-language="javascript">JavaScript</button></li>
    </ul>
  </div>

  <!-- ResultsScreen -->
  <div class="results-screen hidden">
    <h2 class="results-title">Level Complete!</h2>
    <div class="results-stats">
      <div class="results-stat">
        <span class="results-label">Score</span>
        <span class="results-stat-value results-score">0</span>
      </div>
      <div class="results-stat">
        <span class="results-label">Accuracy</span>
        <span class="results-stat-value results-accuracy">0%</span>
      </div>
      <div class="results-stat">
        <span class="results-label">CPM</span>
        <span class="results-stat-value results-cpm">0</span>
      </div>
      <div class="results-stat">
        <span class="results-label">Questions</span>
        <span class="results-stat-value results-questions">0 / 0</span>
      </div>
    </div>
    <div class="results-actions">
      <button type="button" class="results-main-menu">
        <svg viewBox="0 0 24 24" width="18" height="18"><use href="../assets/icons/menu-icon.svg#menu-icon"></use></svg>
        Main Menu
      </button>
      <button type="button" class="results-retry">
        <svg viewBox="0 0 24 24" width="18" height="18"><use href="../assets/icons/retry-icon.svg#retry-icon"></use></svg>
        Retry
      </button>
      <button type="button" class="results-next">
        <svg viewBox="0 0 24 24" width="18" height="18"><use href="../assets/icons/next-icon.svg#next-icon"></use></svg>
        Next
      </button>
    </div>
    <p class="results-label results-language-label">Language: <span class="results-language">Python</span></p>
  </div>

  <!-- GameUI -->
  <div id="game-ui" class="game-ui hidden">
    <button type="button" class="game-header-pause">
      <svg viewBox="0 0 256 256"><use href="../assets/icons/pause-icon.svg#pause-icon" fill="#E53935"></use></svg>
    </button>

    <div class="timer-container">
      <!-- Timer -->
      <span class="timer">0:00</span>
    </div>

    <!--NotificationDisplay-->
    <div class="notification-display">
      <span class="notification-display-text"></span>
    </div>

    <!-- Combo -->
    <div class="combo"><span class="combo-number">0</span></div>

    <!-- PauseMenu -->
    <div class="pause-menu">
        <h3 class="pause-menu-title">Paused</h3>
        <ul class="pause-menu-list">
            <li><button type="button" class="pause-menu-resume" tabindex="1">Resume</button></li>
            <li><button type="button" class="pause-menu-retry" tabindex="2">Retry</button></li>
            <li><button type="button" class="pause-menu-main-menu" tabindex="3">Main Menu</button></li>
        </ul>
        <h4 class="pause-menu-current-language"></h4>
    </div>

    
    <!-- PlantDisplayGroup -->
    <div class="plant-display-group"></div>
    <div class="game-input-area">
      <!-- PromptDisplay -->
      <div class="prompt-display">
        <p class="prompt-display-text">Loading question...</p>
      </div>
      <!-- CodeInputField -->
      <div class="code-input-field">
        <div class="ghost-text">
          <span class="ghost-text-invisible"></span>
          <span class="ghost-text-visible"></span>
        </div>
        <div class="code-input-highlight" aria-hidden="true" spellcheck="false">
          <span class="highlight-correct"></span>
          <span class="highlight-error"></span>
        </div>
        <input class="code-input" />
      </div>
    </div>

    <div class="game-tray">
      <!-- StatsDisplay -->
      <div class="stats-display">
        <span class="stats-display-score">00000</span>
        <span class="stats-display-accuracy" style="display: none;">100%</span>
        <span class="stats-display-cpm">0 cpm</span>
      </div> 
    </div>
  </div>
</body>
</html>
