name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
      - research
      - feat/**
      - docs/**
      - fix/**
      - test/**

  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      # Run Jest in CI mode
      - name: Run tests
        run: npm test -- --ci

      - name: Build project
        run: npm run build
      
      - name: Debug dist contents
        run: ls -la ./dist

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      # Upload build artifacts for deployment 
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
